spring.application.name=api

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/clase4
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=clavesupersecretademasde32caracteresparaelcursodelenguajes
jwt.expiration=3600000

# GOOGLE LOGIN (SIN EXPONER DATOS)
spring.security.oauth2.client.registration.google.client-id=OCULTO
spring.security.oauth2.client.registration.google.client-secret=OCULTO
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub