<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .google-btn {
            background-color: #db4437;
        }

        .google-btn:hover {
            background-color: #c23321;
        }

        .divider {
            margin: 15px 0;
            font-size: 14px;
            color: #888;
        }

        .test-users {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
        }

        .test-users span {
            display: block;
        }
    </style>
</head>
<body>

<div class="login-container">

    <h2>Iniciar sesión</h2>

    <!-- LOGIN NORMAL -->
    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
    </form>

    <div class="divider">o</div>

    <!-- LOGIN GOOGLE -->
    <a href="/oauth2/authorization/google">
        <button class="google-btn">Ingresar con Google</button>
    </a>

    <!-- USUARIOS DE PRUEBA -->
    <div class="test-users">
        <p>Usuarios de prueba:</p>
        <span><b>admin</b> / admin</span>
        <span><b>user</b> / user</span>
    </div>

</div>

</body>
</html>
